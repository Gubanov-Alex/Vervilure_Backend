name: Django CI v5

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [ "dev", "deploy", "docker_update" ]
  pull_request:
    branches: [ "dev", "deploy", "docker_update" ]
  workflow_dispatch:  # Ручной запуск
    inputs:
      debug_enabled:
        description: 'Enable debug mode'
        required: false
        default: false
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.12]

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin_password
          POSTGRES_DB: test_db
        ports:
          - 5440:5432  # Стандартный порт
        options: >-
          --health-cmd "pg_isready -U admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:6
        ports:
          - 6390:6379  # Стандартный порт
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://admin:admin_password@localhost:5440/test_db
      CELERY_BROKER_URL: redis://localhost:6390/0
      CELERY_RESULT_BACKEND: redis://localhost:6390/0

    steps:
      - uses: actions/checkout@v4

      - name: Cache Poetry & pip
        uses: actions/cache@v4  # Обновленная версия
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5  # Обновленная версия
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create false

      - name: Install dependencies
        run: |
          poetry install --no-root

      - name: Prepare environment
        run: |
          cp .env_default .env
          cat >> .env << EOF
          SECRET_KEY=django-insecure-key-for-testing-$(date +%s)
          DEBUG=True
          DATABASE_URL=postgres://admin:admin_password@localhost:5440/test_db
          CELERY_BROKER_URL=redis://localhost:6390/0
          CELERY_RESULT_BACKEND=redis://localhost:6390/0
          REDIS_HOST=localhost
          REDIS_PORT=6390
          DB_HOST=localhost
          DB_PORT=5440
          DB_NAME=test_db
          DB_USER=admin
          DB_PASSWORD=admin_password
          EOF
          cat .env  # Выводим содержимое для отладки

      - name: Check security vulnerabilities
        run: |
          poetry run safety check --json || true  # Не фейлим на vulnerabilities

      - name: Run code quality checks
        run: |
          poetry run black --check --diff .
          poetry run isort --check --diff .
          poetry run flake8 . --max-line-length=120 --extend-ignore=E203,W503 --show-source --statistics

      - name: Type checking
        run: |
          poetry add mypy django-stubs --group dev
          poetry run mypy src/ --ignore-missing-imports || true

      - name: Run Django system checks
        run: |
          export PYTHONPATH=$PWD
          poetry run python manage.py check --deploy

      - name: Run Django migrations
        run: |
          export PYTHONPATH=$PWD
          echo "Database URL: $DATABASE_URL"
          echo "Current directory: $(pwd)"
          echo "Python path: $PYTHONPATH"
          echo "Environment variables:"
          env | grep -E 'DATABASE|POSTGRES|DB_'
          poetry run python -c "import os; print('DATABASE_URL from Python:', os.environ.get('DATABASE_URL'))"
          poetry run python manage.py migrate --noinput

      - name: Run Django tests
        run: |
          export PYTHONPATH=$PWD
          # Добавляем дополнительное время для запуска тестов
          poetry run python manage.py test --verbosity=2 --parallel --keepdb

  coverage:
    needs: test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin_password
          POSTGRES_DB: test_db
        ports:
          - 5440:5432
        options: >-
          --health-cmd "pg_isready -U admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://admin:admin_password@localhost:5440/test_db

    steps:
      - uses: actions/checkout@v4

      - name: Cache Poetry & pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create false

      - name: Install dependencies
        run: |
          poetry install --no-root
          poetry add coverage[toml] --group dev

      - name: Prepare environment
        run: |
          cp .env_default .env   
          cat >> .env << EOF
          SECRET_KEY=django-insecure-key-for-testing-$(date +%s)
          DEBUG=True
          DATABASE_URL=${{ env.DATABASE_URL }}
          EOF

      - name: Run tests with coverage
        run: |
          export PYTHONPATH=$PWD
          poetry run coverage run --source=src manage.py test
          poetry run coverage report -m --fail-under=80
          poetry run coverage xml