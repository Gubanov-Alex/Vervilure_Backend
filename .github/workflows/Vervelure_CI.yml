name: 🚀 Vervelure Django CI/CD Pipeline

permissions:
  contents: read
  pull-requests: write
  security-events: write
  actions: read

on:
  push:
    branches: [ "dev", "main", "feat/User_autorization" ]
  pull_request:
    branches: [ "dev", "main" ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Enable debug mode'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.12"
  POSTGRES_IMAGE: "postgres:15-alpine"
  REDIS_IMAGE: "redis:7-alpine"

jobs:
  # ==========================================
  # 🎯 FOUNDATION SETUP WITH DEPENDENCY CACHING
  # ==========================================
  foundation-setup:
    name: "🎯 Foundation Setup"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      cache-key: ${{ steps.cache.outputs.cache-hit }}
      python-version: ${{ env.PYTHON_VERSION }}

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: "💾 Cache Dependencies"
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
            ~/.local/share/pypoetry
          key: deps-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock', '**/pyproject.toml') }}
          restore-keys: |
            deps-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: "🎭 Install Poetry"
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          poetry --version

      - name: "📦 Configure Poetry & Install Dependencies"
        run: |
          poetry config virtualenvs.create false
          poetry config installer.parallel true
          poetry install --only=main --no-root
          pip install psycopg2-binary

  # ==========================================
  # 🧪 INDIVIDUAL TEST MATRIX EXECUTION
  # ==========================================
  test-matrix:
    name: "🧪 Tests: ${{ matrix.test-file }}"
    runs-on: ubuntu-latest
    needs: foundation-setup
    timeout-minutes: 12

    strategy:
      fail-fast: false
      matrix:
        test-file:
          - 'test_oauth_validators.py'
          - 'test_serializers.py'
          - 'test_views.py'
          - 'test_models.py'
          - 'test_admin.py'
          - 'test_google_oauth.py'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: vervelure_test_user
          POSTGRES_PASSWORD: vervelure_test_pass_2024
          POSTGRES_DB: vervelure_test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U vervelure_test_user -d vervelure_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    env:
      # Critical CI Environment Variables
      ENVIRONMENT: ci
      IS_CI: "true"
      IS_TESTING: "true"
      GITHUB_ACTIONS: "true"

      # Database Configuration (Individual settings override DATABASE_URL)
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: localhost
      DB_PORT: 5433
      DB_NAME: vervelure_test_db
      DB_USER: vervelure_test_user
      DB_PASSWORD: vervelure_test_pass_2024

      # Redis Configuration
      REDIS_HOST: localhost
      REDIS_PORT: 6380
      CELERY_BROKER_URL: redis://localhost:6380/0
      CELERY_RESULT_BACKEND: redis://localhost:6380/0

      # Django Security & Debug
      SECRET_KEY: django-insecure-ci-matrix-test-key-${{ github.run_id }}
      DEBUG: "true"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver

      # Performance Optimizations
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
      CELERY_TASK_ALWAYS_EAGER: "true"
      CELERY_TASK_EAGER_PROPAGATES: "true"
      DISABLE_MIGRATIONS: "false"

      # Test Configuration
      PYTEST_TIMEOUT: 300
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.foundation-setup.outputs.python-version }}
          cache: 'pip'

      - name: "💾 Restore Dependencies Cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
            ~/.local/share/pypoetry
          key: deps-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock', '**/pyproject.toml') }}

      - name: "🎭 Install Poetry & Dependencies"
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          poetry config virtualenvs.create false
          poetry install --only=main --no-root
          pip install psycopg2-binary

      - name: "🔧 Verify Services Health"
        run: |
          echo "🏥 Checking PostgreSQL health..."
          timeout 60s bash -c 'until pg_isready -h localhost -p 5433 -U vervelure_test_user; do sleep 2; done'
          echo "✅ PostgreSQL is ready"
          
          echo "🏥 Checking Redis health..."
          timeout 30s bash -c 'until redis-cli -h localhost -p 6380 ping | grep -q PONG; do sleep 1; done'
          echo "✅ Redis is ready"

      - name: "🗄️ Django Setup & Database Migration"
        run: |
          export PYTHONPATH=$PWD
          echo "🔧 Initializing Django with CI settings..."
          
          # Clear any existing DATABASE_URL to force individual settings
          unset DATABASE_URL
          
          # Initialize Django and verify configuration
          python -c "
          import os
          import django
          from django.conf import settings
          
          os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'config.settings')
          django.setup()
          
          print('✅ Django initialized successfully')
          print(f'🗄️  Database: {settings.DATABASES[\"default\"][\"NAME\"]}@{settings.DATABASES[\"default\"][\"HOST\"]}:{settings.DATABASES[\"default\"][\"PORT\"]}')
          print(f'🔗 Redis: {settings.CACHES[\"default\"][\"LOCATION\"]}')
          print(f'🌍 Environment: {settings.ENVIRONMENT}')
          print(f'🧪 Testing Mode: {getattr(settings, \"IS_TESTING\", False)}')
          "
          
          # Run migrations with proper error handling
          echo "🚀 Running database migrations..."
          python manage.py migrate --noinput --verbosity=1
          echo "✅ Database migrations completed successfully"

      - name: "📋 Verify Test File Structure"
        run: |
          test_file="tests/${{ matrix.test-file }}"
          echo "🔍 Verifying test file: $test_file"
          
          if [[ -f "$test_file" ]]; then
            echo "✅ Test file found: $test_file"
            echo "📊 File stats:"
            echo "   - Size: $(wc -l < "$test_file") lines"
            echo "   - Last modified: $(stat -c %y "$test_file")"
            
            echo "🔬 Test collection preview:"
            poetry run pytest "$test_file" --collect-only -q --maxfail=1 || {
              echo "⚠️  Test collection failed, but continuing..."
            }
          else
            echo "❌ Test file NOT found: $test_file"
            echo "📁 Available test files:"
            find tests/ -name "*.py" -type f | sort || echo "No test files found"
            exit 1
          fi

      - name: "🧪 Execute Pytest for ${{ matrix.test-file }}"
        run: |
          export PYTHONPATH=$PWD
          test_file="tests/${{ matrix.test-file }}"
          
          echo "🚀 Executing pytest for: ${{ matrix.test-file }}"
          echo "=========================================="
          
          # Execute tests with comprehensive configuration
          poetry run pytest "$test_file" \
            -v \
            --tb=short \
            --maxfail=5 \
            --disable-warnings \
            --no-header \
            --strict-markers \
            --strict-config \
            -x \
            --timeout=300 \
            --durations=10 \
            || {
              echo "❌ Tests FAILED for ${{ matrix.test-file }}"
              echo "📋 Test failure analysis:"
              echo "   - File: $test_file"
              echo "   - Exit code: $?"
              echo "   - Timestamp: $(date)"
              exit 1
            }
          
          echo "✅ All tests PASSED for ${{ matrix.test-file }}"

      - name: "📊 Test Results Summary"
        if: always()
        run: |
          echo "📈 Test Execution Summary:"
          echo "   🎯 Target: tests/${{ matrix.test-file }}"
          echo "   📊 Status: ${{ job.status }}"
          echo "   ⏰ Completed: $(date)"
          echo "   🔧 Environment: CI Matrix"

  # ==========================================
  # 🏁 CONSOLIDATED TEST SUITE EXECUTION
  # ==========================================
  test-suite:
    name: "🏁 Full Test Suite"
    runs-on: ubuntu-latest
    needs: foundation-setup
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: vervelure_suite_user
          POSTGRES_PASSWORD: vervelure_suite_pass_2024
          POSTGRES_DB: vervelure_suite_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U vervelure_suite_user -d vervelure_suite_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    env:
      ENVIRONMENT: ci
      IS_CI: "true"
      IS_TESTING: "true"
      GITHUB_ACTIONS: "true"

      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: localhost
      DB_PORT: 5433
      DB_NAME: vervelure_suite_db
      DB_USER: vervelure_suite_user
      DB_PASSWORD: vervelure_suite_pass_2024

      REDIS_HOST: localhost
      REDIS_PORT: 6380
      CELERY_BROKER_URL: redis://localhost:6380/0
      CELERY_RESULT_BACKEND: redis://localhost:6380/0

      SECRET_KEY: django-insecure-ci-suite-test-key-${{ github.run_id }}
      DEBUG: "true"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver

      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
      CELERY_TASK_ALWAYS_EAGER: "true"
      CELERY_TASK_EAGER_PROPAGATES: "true"

      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.foundation-setup.outputs.python-version }}
          cache: 'pip'

      - name: "💾 Restore Dependencies Cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
            ~/.local/share/pypoetry
          key: deps-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock', '**/pyproject.toml') }}

      - name: "🎭 Install Poetry & Dependencies"
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          poetry config virtualenvs.create false
          poetry install --only=main
          pip install psycopg2-binary

      - name: "🔧 Verify Services & Django Setup"
        run: |
          # Health checks
          timeout 60s bash -c 'until pg_isready -h localhost -p 5433 -U vervelure_suite_user; do sleep 2; done'
          timeout 30s bash -c 'until redis-cli -h localhost -p 6380 ping | grep -q PONG; do sleep 1; done'
          
          # Django initialization
          export PYTHONPATH=$PWD
          unset DATABASE_URL
          
          python -c "
          import os
          import django
          from django.conf import settings
          
          os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'config.settings')
          django.setup()
          
          print('✅ Full suite Django setup completed')
          print(f'🗄️  Database: {settings.DATABASES[\"default\"][\"NAME\"]}')
          print(f'🧪 Test environment verified')
          "
          
          python manage.py migrate --noinput --verbosity=1
          echo "✅ Full suite database ready"

      - name: "🧪 Execute Complete Test Suite"
        run: |
          export PYTHONPATH=$PWD
          
          echo "🚀 Executing COMPLETE test suite..."
          echo "====================================="
          
          # Run all tests with comprehensive reporting
          poetry run pytest tests/ \
            -v \
            --tb=short \
            --maxfail=10 \
            --disable-warnings \
            --strict-markers \
            --strict-config \
            --timeout=300 \
            --durations=20 \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            || {
              echo "❌ FULL TEST SUITE FAILED"
              echo "📋 Failure analysis:"
              echo "   - Total tests executed"
              echo "   - Coverage threshold: 70%"
              echo "   - Exit code: $?"
              exit 1
            }
          
          echo "✅ COMPLETE TEST SUITE PASSED"

      - name: "📊 Final Test Suite Report"
        if: always()
        run: |
          echo "🏆 Final Test Suite Results:"
          echo "   🎯 Scope: Complete test directory"
          echo "   📊 Status: ${{ job.status }}"
          echo "   ⏰ Completed: $(date)"
          echo "   🔧 Environment: CI Full Suite"

  # ==========================================
  # 📋 DEPENDENCY SECURITY AUDIT
  # ==========================================
  security-audit:
    name: "🛡️ Security Audit"
    runs-on: ubuntu-latest
    needs: foundation-setup
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.foundation-setup.outputs.python-version }}

      - name: "🛡️ Security Vulnerability Scan"
        run: |
          pip install safety bandit
          
          echo "🔍 Scanning dependencies for known vulnerabilities..."
          safety check --json || echo "⚠️ Safety check completed with warnings"
          
          echo "🔍 Static security analysis..."
          bandit -r src/ -f json || echo "⚠️ Bandit scan completed with warnings"

  # ==========================================
  # 📊 STATUS AGGREGATION
  # ==========================================
  ci-status:
    name: "📊 CI Status Summary"
    runs-on: ubuntu-latest
    needs: [foundation-setup, test-matrix, test-suite, security-audit]
    if: always()

    steps:
      - name: "📊 Generate CI Summary"
        run: |
          echo "🏆 Vervelure CI/CD Pipeline Results:"
          echo "=================================="
          echo "🎯 Foundation Setup: ${{ needs.foundation-setup.result }}"
          echo "🧪 Test Matrix: ${{ needs.test-matrix.result }}"
          echo "🏁 Test Suite: ${{ needs.test-suite.result }}"
          echo "🛡️ Security Audit: ${{ needs.security-audit.result }}"
          echo "=================================="
          
          # Determine overall status
          if [[ "${{ needs.test-matrix.result }}" == "success" && "${{ needs.test-suite.result }}" == "success" ]]; then
            echo "✅ OVERALL STATUS: SUCCESS"
            exit 0
          else
            echo "❌ OVERALL STATUS: FAILURE"
            exit 1
          fi
