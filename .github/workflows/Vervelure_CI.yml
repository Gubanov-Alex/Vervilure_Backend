name: 🚀 Django Enterprise CI/CD Pipeline

permissions:
  contents: read
  pull-requests: write
  security-events: write
  actions: read

on:
  push:
    branches: [ "dev", "main", "feat/User_autorization" ]
  pull_request:
    branches: [ "dev", "main" ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Enable debug mode'
        required: false
        default: false
        type: boolean
      deploy_to_staging:
        description: 'Deploy to staging after tests'
        required: false
        default: false
        type: boolean

env:
  # Global environment variables
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "1.7.1"
  NODE_VERSION: "20"

jobs:
  # =====================================
  # 🔧 SETUP & PREPARATION PHASE
  # =====================================
  setup:
    name: "🔧 Environment Setup"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      cache-key: ${{ steps.cache-keys.outputs.cache-key }}
      python-version: ${{ env.PYTHON_VERSION }}
      should-deploy: ${{ steps.deployment-check.outputs.should-deploy }}

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: "🐍 Setup Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "📝 Generate Cache Keys"
        id: cache-keys
        run: |
          echo "cache-key=${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}-${{ hashFiles('**/pyproject.toml') }}" >> $GITHUB_OUTPUT

      - name: "💾 Cache Poetry Dependencies"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ steps.cache-keys.outputs.cache-key }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: "🎭 Install Poetry"
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: "⚙️ Configure Poetry"
        run: |
          poetry config virtualenvs.create false
          poetry config virtualenvs.in-project true

      - name: "📦 Install Dependencies"
        run: |
          poetry install --no-root

      - name: "🚀 Check Deployment Conditions"
        id: deployment-check
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.event.inputs.deploy_to_staging }}" == "true" ]]; then
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should-deploy=false" >> $GITHUB_OUTPUT
          fi

  # =====================================
  # 🔒 SECURITY & CODE QUALITY PHASE
  # =====================================
  security-audit:
    name: "🔒 Security Audit"
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 15

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.setup.outputs.python-version }}

      - name: "💾 Restore Dependencies Cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ needs.setup.outputs.cache-key }}

      - name: "🎭 Install Poetry"
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          poetry config virtualenvs.create false

      - name: "📦 Install Dependencies"
        run: poetry install --no-root

      - name: "🛡️ Run Safety Security Check"
        run: |
          poetry run safety check --json --output safety-report.json || true
          poetry run safety check --short-report || echo "⚠️ Security vulnerabilities found"

      - name: "🔐 Run Bandit Security Linter"
        run: |
          poetry run pip install bandit || poetry run pip install bandit[toml]
          poetry run bandit -r src/ -f json -o bandit-report.json || true
          poetry run bandit -r src/ -ll || echo "⚠️ Security issues detected"

      - name: "📊 Upload Security Reports"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            safety-report.json
            bandit-report.json
          retention-days: 30

  code-quality:
    name: "✨ Code Quality Analysis"
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 15

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.setup.outputs.python-version }}

      - name: "💾 Restore Dependencies Cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ needs.setup.outputs.cache-key }}

      - name: "🎭 Install Poetry"
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          poetry config virtualenvs.create false

      - name: "📦 Install Dependencies"
        run: poetry install --no-root

      - name: "🖤 Format Check (Black)"
        run: |
          poetry run black --check --diff . || {
            echo "❌ Code formatting issues found"
            echo "Run 'poetry run black .' to fix"
            exit 1
          }

      - name: "🔤 Import Sorting (isort)"
        run: |
          poetry run isort --check --diff . || {
            echo "❌ Import sorting issues found"
            echo "Run 'poetry run isort .' to fix"
            exit 1
          }

      - name: "🔍 Linting (flake8)"
        run: |
          poetry run flake8 . \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --show-source \
            --statistics \
            --format='%(path)s:%(row)d:%(col)d: %(code)s %(text)s'

      - name: "🔬 Type Checking (mypy)"
        run: |
          poetry run mypy src/ \
            --ignore-missing-imports \
            --show-error-codes \
            --pretty || echo "⚠️ Type checking issues found"

  # =====================================
  # 🧪 TESTING PHASE
  # =====================================
  django-tests:
    name: "🧪 Django Unit Tests"
    runs-on: ubuntu-latest
    needs: [setup, security-audit, code-quality]
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        test-group: ["auth", "api", "models", "views"]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin_password
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U admin -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: ci
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: localhost
      DB_PORT: 5433
      DB_NAME: test_db
      DB_USER: admin
      DB_PASSWORD: admin_password
      REDIS_HOST: localhost
      REDIS_PORT: 6380
      CELERY_BROKER_URL: redis://localhost:6380/0
      CELERY_RESULT_BACKEND: redis://localhost:6380/0
      SECRET_KEY: django-insecure-ci-test-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: "💾 Restore Dependencies Cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ needs.setup.outputs.cache-key }}

      - name: "🎭 Install Poetry & Dependencies"
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          poetry config virtualenvs.create false
          poetry install --no-root

      - name: "🗄️ Install System Dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client redis-tools

      - name: "⏳ Wait for Services"
        run: |
          echo "🐘 Waiting for PostgreSQL..."
          timeout 60 bash -c 'until pg_isready -h localhost -p 5433 -U admin; do sleep 2; done'
          echo "🔴 Waiting for Redis..."
          timeout 60 bash -c 'until redis-cli -h localhost -p 6380 ping; do sleep 2; done'
          echo "✅ All services ready!"

      - name: "🔧 Django System Checks"
        run: |
          export PYTHONPATH=$PWD
          poetry run python manage.py check --deploy

      - name: "🗄️ Database Migrations"
        run: |
          export PYTHONPATH=$PWD
          poetry run python manage.py makemigrations --check --dry-run || {
            echo "Creating missing migrations..."
            poetry run python manage.py makemigrations
          }
          poetry run python manage.py migrate --noinput

      - name: "🧪 Run Tests - ${{ matrix.test-group }}"
        run: |
          export PYTHONPATH=$PWD
          case "${{ matrix.test-group }}" in
            "auth") 
              if [ -d "src/apps/accounts/tests" ]; then
                poetry run python manage.py test src.apps.accounts --verbosity=2
              else
                echo "ℹ️ No auth tests found, running general tests"
                poetry run python manage.py test --verbosity=2 --parallel --keepdb
              fi
              ;;
            "api"|"models"|"views") 
              if [ -d "tests" ]; then
                poetry run python manage.py test tests --verbosity=2 --parallel --keepdb
              else
                echo "ℹ️ Running available tests"
                poetry run python manage.py test --verbosity=2 --parallel --keepdb
              fi
              ;;
          esac

  integration-tests:
    name: "🔗 Integration Tests"
    runs-on: ubuntu-latest
    needs: [django-tests]
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin_password
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U admin -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379

    env:
      ENVIRONMENT: ci
      DB_HOST: localhost
      DB_PORT: 5433
      DB_NAME: test_db
      DB_USER: admin
      DB_PASSWORD: admin_password
      REDIS_HOST: localhost
      REDIS_PORT: 6380
      SECRET_KEY: django-insecure-integration-test-key
      DEBUG: "True"

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.setup.outputs.python-version }}

      - name: "💾 Restore Dependencies Cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ needs.setup.outputs.cache-key }}

      - name: "🎭 Install Poetry & Dependencies"
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          poetry config virtualenvs.create false
          poetry install --no-root

      - name: "🗄️ Setup Database"
        run: |
          sudo apt-get install -y postgresql-client
          timeout 60 bash -c 'until pg_isready -h localhost -p 5433 -U admin; do sleep 2; done'
          export PYTHONPATH=$PWD
          poetry run python manage.py migrate --noinput

      - name: "🔗 Run Integration Tests with pytest"
        run: |
          export PYTHONPATH=$PWD
          poetry run pytest tests/integration/ \
            --ds=config.settings \
            --reuse-db \
            --verbose \
            --tb=short \
            --durations=10

  # =====================================
  # 📊 COVERAGE & REPORTING PHASE
  # =====================================
  coverage-analysis:
    name: "📊 Coverage Analysis"
    runs-on: ubuntu-latest
    needs: [django-tests, integration-tests]
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin_password
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U admin -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: ci
      DB_HOST: localhost
      DB_PORT: 5433
      DB_NAME: test_db
      DB_USER: admin
      DB_PASSWORD: admin_password
      SECRET_KEY: django-insecure-coverage-test-key
      DEBUG: "True"

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.setup.outputs.python-version }}

      - name: "💾 Restore Dependencies Cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ needs.setup.outputs.cache-key }}

      - name: "🎭 Install Poetry & Dependencies"
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          poetry config virtualenvs.create false
          poetry install --no-root

      - name: "🗄️ Setup Database"
        run: |
          sudo apt-get install -y postgresql-client
          timeout 60 bash -c 'until pg_isready -h localhost -p 5433 -U admin; do sleep 2; done'
          export PYTHONPATH=$PWD
          poetry run python manage.py migrate --noinput

      - name: "📊 Run Tests with Coverage"
        run: |
          export PYTHONPATH=$PWD
          poetry run coverage run --source='.' manage.py test --verbosity=2
          poetry run coverage report -m --fail-under=70
          poetry run coverage xml
          poetry run coverage html

      - name: "📈 Upload Coverage Reports"
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

      - name: "📤 Upload to Codecov"
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # =====================================
  # 🐳 BUILD & CONTAINERIZATION PHASE
  # =====================================
  docker-build:
    name: "🐳 Docker Build & Security Scan"
    runs-on: ubuntu-latest
    needs: [coverage-analysis]
    if: needs.setup.outputs.should-deploy == 'true'
    timeout-minutes: 20

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      - name: "🐳 Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "🏗️ Build Docker Image"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: vervilure-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: "🔒 Run Trivy Security Scan"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vervilure-backend:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: "📤 Upload Trivy Results"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # =====================================
  # 🚀 DEPLOYMENT SIMULATION PHASE
  # =====================================
  deployment-check:
    name: "🚀 Deployment Readiness Check"
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: needs.setup.outputs.should-deploy == 'true'
    timeout-minutes: 10

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      - name: "✅ Validate Deployment Configuration"
        run: |
          echo "🔍 Checking deployment configurations..."
          
          # Check if required files exist
          if [[ ! -f "docker-compose.yml" ]]; then
            echo "❌ docker-compose.yml not found"
            exit 1
          fi
          
          if [[ ! -f "Dockerfile" ]]; then
            echo "❌ Dockerfile not found"
            exit 1
          fi
          
          echo "✅ All deployment files present"

      - name: "🏗️ Test Docker Compose Configuration"
        run: |
          echo "🐳 Testing docker-compose configuration..."
          docker-compose config > /dev/null
          echo "✅ Docker Compose configuration is valid"

      - name: "📊 Generate Deployment Report"
        run: |
          echo "📄 Generating deployment readiness report..."
          cat << EOF > deployment-report.md
          # 🚀 Deployment Readiness Report
          
          **Build Information:**
          - Commit SHA: \`${{ github.sha }}\`
          - Branch: \`${{ github.ref_name }}\`
          - Triggered by: ${{ github.actor }}
          
          **Quality Gates:**
          - ✅ Security audit passed
          - ✅ Code quality checks passed
          - ✅ All tests passed
          - ✅ Coverage threshold met
          - ✅ Docker build successful
          - ✅ Security scan completed
          
          **Ready for deployment!** 🎉
          EOF

      - name: "📤 Upload Deployment Report"
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report
          path: deployment-report.md
          retention-days: 30

  # =====================================
  # 📬 NOTIFICATION & CLEANUP PHASE
  # =====================================
  notify-completion:
    name: "📬 Pipeline Completion Notification"
    runs-on: ubuntu-latest
    needs: [deployment-check, coverage-analysis]
    if: always()
    timeout-minutes: 5

    steps:
      - name: "📊 Determine Pipeline Status"
        id: status
        run: |
          if [[ "${{ needs.deployment-check.result }}" == "success" ]] || [[ "${{ needs.coverage-analysis.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=🎉" >> $GITHUB_OUTPUT
            echo "message=Pipeline completed successfully!" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "message=Pipeline failed. Please check the logs." >> $GITHUB_OUTPUT
          fi

      - name: "${{ steps.status.outputs.emoji }} Pipeline Summary"
        run: |
          echo "==================================="
          echo "${{ steps.status.outputs.emoji }} ${{ steps.status.outputs.message }}"
          echo "==================================="
          echo "📊 Pipeline Results:"
          echo "   🔧 Setup: ${{ needs.setup.result }}"
          echo "   🔒 Security: ${{ needs.security-audit.result }}"
          echo "   ✨ Quality: ${{ needs.code-quality.result }}"
          echo "   🧪 Tests: ${{ needs.django-tests.result }}"
          echo "   🔗 Integration: ${{ needs.integration-tests.result }}"
          echo "   📊 Coverage: ${{ needs.coverage-analysis.result }}"
          echo "   🐳 Docker: ${{ needs.docker-build.result }}"
          echo "   🚀 Deployment: ${{ needs.deployment-check.result }}"
          echo "==================================="
