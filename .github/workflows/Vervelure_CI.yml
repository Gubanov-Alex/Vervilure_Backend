name: 🚀 Vervelure Django CI/CD Pipeline

permissions:
  contents: read
  pull-requests: write
  security-events: write
  actions: read

on:
  push:
    branches: [ "dev", "main", "feat/Admin_panel" ]
  pull_request:
    branches: [ "dev", "main" ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Enable debug mode'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.12"
  POSTGRES_IMAGE: "postgres:15-alpine"
  REDIS_IMAGE: "redis:7-alpine"

jobs:
  # ==========================================
  # 🎯 FOUNDATION SETUP WITH DEPENDENCY CACHING
  # ==========================================
  foundation-setup:
    name: "🎯 Foundation Setup"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      cache-key: ${{ steps.cache.outputs.cache-hit }}
      python-version: ${{ env.PYTHON_VERSION }}

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "💾 Cache Dependencies"
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: "🐍 Setup Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "🎭 Install Poetry"
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: "📦 Configure Poetry & Install Dependencies"
        run: |
          poetry config virtualenvs.create false
          poetry install --no-root
          pip install psycopg2-binary

  # ==========================================
  # 🧪 INDIVIDUAL TEST MATRIX EXECUTION
  # ==========================================
  test-matrix:
    name: "🧪 Tests: ${{ matrix.test-file }}"
    runs-on: ubuntu-latest
    needs: foundation-setup
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        test-file:
          - 'test_oauth_validators.py'
          - 'test_serializers.py'
          - 'test_views.py'
          - 'test_models.py'
          - 'test_admin.py'
          - 'test_google_oauth.py'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin_password
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U admin -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Critical CI Environment Variables
      ENVIRONMENT: ci

      # Database Configuration (Individual settings override DATABASE_URL)
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: localhost
      DB_PORT: 5433
      DB_NAME: test_db
      DB_USER: admin
      DB_PASSWORD: admin_password

      # Redis Configuration
      REDIS_HOST: localhost
      REDIS_PORT: 6380
      CELERY_BROKER_URL: redis://localhost:6380/0
      CELERY_RESULT_BACKEND: redis://localhost:6380/0

      # Django Security & Debug
      SECRET_KEY: django-insecure-ci-test-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver

      # Performance Optimizations
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "💾 Restore Dependencies Cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.foundation-setup.outputs.python-version }}

      - name: "🎭 Install Poetry & Dependencies"
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: "📦 Configure Poetry & Install Dependencies"
        run: |
          poetry config virtualenvs.create false
          poetry install --no-root

      - name: "🔧 Install System Dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client redis-tools

      - name: "🔧 Verify Services Health"
        run: |
          echo "🏥 Checking PostgreSQL health..."
          timeout 60 bash -c 'until pg_isready -h localhost -p 5433 -U admin; do sleep 1; done'
          echo "✅ PostgreSQL is ready"
          
          echo "🏥 Checking Redis health..."
          timeout 60 bash -c 'until redis-cli -h localhost -p 6380 ping; do sleep 1; done'
          echo "✅ Redis is ready"

      - name: "🗄️ Debug Environment Variables"
        run: |
          echo "🔍 Environment Variables Debug:"
          echo "DATABASE_URL: ${DATABASE_URL:-NOT_SET}"
          echo "DB_HOST: ${DB_HOST:-NOT_SET}"
          echo "DB_PORT: ${DB_PORT:-NOT_SET}"
          echo "DB_NAME: ${DB_NAME:-NOT_SET}"
          echo "ENVIRONMENT: ${ENVIRONMENT:-NOT_SET}"
          echo "GITHUB_ACTIONS: ${GITHUB_ACTIONS:-NOT_SET}"

      - name: "🗄️ Verify Database Connection"
        run: |
          PGPASSWORD=admin_password psql -h localhost -p 5433 -U admin -d test_db -c "SELECT version();"

      - name: "🗄️ Django Setup & Database Migration"
        run: |
          export PYTHONPATH=$PWD
          echo "🔧 Initializing Django with CI settings..."
          
          # Show Django configuration
          poetry run python -c "
          import os
          import django
          from django.conf import settings
          os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'config.settings')
          django.setup()
          print(f'✅ Final database config: {settings.DATABASES[\"default\"]}')
          print(f'🔗 Cache config: {settings.CACHES[\"default\"][\"BACKEND\"]}')
          "
          
          # Django system checks
          poetry run python manage.py check
          
          # Check for missing migrations
          poetry run python manage.py makemigrations --check --dry-run || {
            echo "🔧 Missing migrations detected. Creating them..."
            poetry run python manage.py makemigrations
            echo "✅ Migrations created successfully"
          }
          
          # Show migration status
          poetry run python manage.py showmigrations
          
          # Run migrations
          echo "🚀 Running database migrations..."
          poetry run python manage.py migrate --noinput
          echo "✅ Database migrations completed successfully"

      - name: "📋 Verify Test File Structure"
        run: |
          test_file="tests/${{ matrix.test-file }}"
          echo "🔍 Verifying test file: $test_file"
          
          if [[ -f "$test_file" ]]; then
            echo "✅ Test file found: $test_file"
            echo "📊 File stats:"
            echo "   - Size: $(wc -l < "$test_file") lines"
            echo "   - Last modified: $(stat -c %y "$test_file")"
          else
            echo "❌ Test file NOT found: $test_file"
            echo "📁 Available test files:"
            find tests/ -name "*.py" -type f | sort || echo "No test files found"
            echo "⚠️  Will skip individual test and run all tests instead"
          fi

      - name: "🧪 Execute Pytest for ${{ matrix.test-file }}"
        run: |
          export PYTHONPATH=$PWD
          test_file="tests/${{ matrix.test-file }}"
          
          echo "🚀 Executing pytest for: ${{ matrix.test-file }}"
          echo "=========================================="
          
          # Check if specific test file exists
          if [[ -f "$test_file" ]]; then
            echo "📋 Running specific test file: $test_file"
            poetry run pytest "$test_file" --ds=config.settings --reuse-db -v || {
              echo "❌ Tests FAILED for ${{ matrix.test-file }}"
              exit 1
            }
          else
            echo "📋 Running all tests as fallback"
            poetry run pytest tests/ --ds=config.settings --reuse-db -v || {
              echo "❌ All tests FAILED"
              exit 1
            }
          fi
          
          echo "✅ Tests PASSED for ${{ matrix.test-file }}"

      - name: "📊 Test Results Summary"
        if: always()
        run: |
          echo "📈 Test Execution Summary:"
          echo "   🎯 Target: tests/${{ matrix.test-file }}"
          echo "   📊 Status: ${{ job.status }}"
          echo "   ⏰ Completed: $(date)"
          echo "   🔧 Environment: CI Matrix"

  # ==========================================
  # 🏁 CONSOLIDATED TEST SUITE EXECUTION
  # ==========================================
  test-suite:
    name: "🏁 Full Test Suite"
    runs-on: ubuntu-latest
    needs: foundation-setup
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin_password
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U admin -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: ci
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: localhost
      DB_PORT: 5433
      DB_NAME: test_db
      DB_USER: admin
      DB_PASSWORD: admin_password
      REDIS_HOST: localhost
      REDIS_PORT: 6380
      CELERY_BROKER_URL: redis://localhost:6380/0
      CELERY_RESULT_BACKEND: redis://localhost:6380/0
      SECRET_KEY: django-insecure-ci-test-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "💾 Restore Dependencies Cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.foundation-setup.outputs.python-version }}

      - name: "🎭 Install Poetry & Dependencies"
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: "📦 Configure Poetry & Install Dependencies"
        run: |
          poetry config virtualenvs.create false
          poetry install --no-root

      - name: "🔧 Install System Dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: "🔧 Verify Services & Django Setup"
        run: |
          echo "🏥 Checking services health..."
          timeout 60 bash -c 'until pg_isready -h localhost -p 5433 -U admin; do sleep 1; done'
          echo "✅ PostgreSQL is ready"
          
          # Django setup
          export PYTHONPATH=$PWD
          
          # Check for missing migrations
          poetry run python manage.py makemigrations --check --dry-run || {
            echo "🔧 Missing migrations detected. Creating them..."
            poetry run python manage.py makemigrations
            echo "✅ Migrations created successfully"
          }
          
          # Run migrations
          poetry run python manage.py migrate --noinput
          echo "✅ Full suite database ready"

      - name: "🧪 Execute Complete Test Suite"
        run: |
          export PYTHONPATH=$PWD
          
          echo "🚀 Executing COMPLETE test suite..."
          echo "====================================="
          
          # Run Django native tests
          poetry run python manage.py test --verbosity=2 --parallel --keepdb
          
          echo "✅ COMPLETE TEST SUITE PASSED"

      - name: "📊 Final Test Suite Report"
        if: always()
        run: |
          echo "🏆 Final Test Suite Results:"
          echo "   🎯 Scope: Complete Django test suite"
          echo "   📊 Status: ${{ job.status }}"
          echo "   ⏰ Completed: $(date)"
          echo "   🔧 Environment: CI Full Suite"

  # ==========================================
  # 🎨 CODE QUALITY & SECURITY AUDIT
  # ==========================================
  quality-security-audit:
    name: "🎨 Quality & Security Audit"
    runs-on: ubuntu-latest
    needs: foundation-setup
    timeout-minutes: 10

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "💾 Restore Dependencies Cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.foundation-setup.outputs.python-version }}

      - name: "🎭 Install Poetry & Dependencies"
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: "📦 Configure Poetry & Install Dependencies"
        run: |
          poetry config virtualenvs.create false
          poetry install --no-root

      - name: "🛡️ Security Vulnerability Scan"
        run: |
          echo "🔍 Scanning dependencies for known vulnerabilities..."
          poetry run safety check --json || echo "⚠️ Safety check completed with warnings"

      - name: "🎨 Code Quality Checks"
        run: |
          echo "🔍 Running code quality checks..."
          poetry run black --check --diff . || echo "⚠️ Black formatting issues found"
          poetry run isort --check --diff . || echo "⚠️ Import sorting issues found"
          poetry run flake8 . --max-line-length=120 --extend-ignore=E203,W503 --show-source --statistics || echo "⚠️ Flake8 issues found"

      - name: "🔍 Type Checking"
        run: |
          echo "🔍 Running type checking..."
          poetry run mypy src/ --ignore-missing-imports || echo "⚠️ Type checking completed with warnings"

  # ==========================================
  # 📊 COVERAGE ANALYSIS
  # ==========================================
  coverage-analysis:
    name: "📊 Coverage Analysis"
    runs-on: ubuntu-latest
    needs: [foundation-setup, test-matrix]
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin_password
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U admin -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: ci
      DB_HOST: localhost
      DB_PORT: 5433
      DB_NAME: test_db
      DB_USER: admin
      DB_PASSWORD: admin_password
      SECRET_KEY: django-insecure-coverage-test-key
      DEBUG: "True"

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "💾 Restore Dependencies Cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.foundation-setup.outputs.python-version }}

      - name: "🎭 Install Poetry & Dependencies"
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: "📦 Configure Poetry & Install Dependencies"
        run: |
          poetry config virtualenvs.create false
          poetry install --no-root

      - name: "🔧 Install System Dependencies & Setup"
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          
          # Wait for PostgreSQL
          timeout 60 bash -c 'until pg_isready -h localhost -p 5433 -U admin; do sleep 1; done'
          
          # Setup Django
          export PYTHONPATH=$PWD
          poetry run python manage.py makemigrations --check --dry-run || {
            poetry run python manage.py makemigrations
          }
          poetry run python manage.py migrate --noinput

      - name: "📊 Execute Tests with Coverage"
        run: |
          export PYTHONPATH=$PWD

          echo "🚀 Running tests with coverage analysis..."

          # Запускаем coverage с pytest
          poetry run coverage run --source=src --branch -m pytest tests/ --ds=config.settings --reuse-db -v

          # Проверяем что coverage собран
          echo "📋 Coverage data collected, generating reports..."

          # Генерируем отчет coverage
          poetry run coverage report -m || {
            echo "⚠️ Coverage report generated with warnings"
          }

          # Получаем процент coverage и проверяем порог (без bc, используем встроенные возможности)
          COVERAGE_PERCENT=$(poetry run coverage report --format=total 2>/dev/null || echo "0")
          echo "📊 Current coverage: ${COVERAGE_PERCENT}%"

          # Проверяем порог без bc (для совместимости)
          if [ "${COVERAGE_PERCENT}" -lt 70 ]; then
            echo "⚠️ Coverage is below 70% threshold (current: ${COVERAGE_PERCENT}%)"
            echo "🔍 This is informational - not failing the build"
          else
            echo "✅ Coverage meets requirements (${COVERAGE_PERCENT}% >= 70%)"
          fi

          # Генерируем XML для Codecov
          poetry run coverage xml

          echo "✅ Coverage analysis completed successfully"

  # ==========================================
  # 📊 STATUS AGGREGATION
  # ==========================================
  ci-status:
    name: "📊 CI Status Summary"
    runs-on: ubuntu-latest
    needs: [foundation-setup, test-matrix, test-suite, quality-security-audit, coverage-analysis]
    if: always()

    steps:
      - name: "📊 Generate CI Summary"
        run: |
          echo "🏆 Vervelure CI/CD Pipeline Results:"
          echo "=================================="
          echo "🎯 Foundation Setup: ${{ needs.foundation-setup.result }}"
          echo "🧪 Test Matrix: ${{ needs.test-matrix.result }}"
          echo "🏁 Test Suite: ${{ needs.test-suite.result }}"
          echo "🎨 Quality & Security: ${{ needs.quality-security-audit.result }}"
          echo "📊 Coverage Analysis: ${{ needs.coverage-analysis.result }}"
          echo "=================================="
          
          # Determine overall status
          if [[ "${{ needs.test-matrix.result }}" == "success" && "${{ needs.test-suite.result }}" == "success" ]]; then
            echo "✅ OVERALL STATUS: SUCCESS"
            exit 0
          else
            echo "❌ OVERALL STATUS: FAILURE"
            exit 1
          fi
