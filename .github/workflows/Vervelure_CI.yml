name: 🚀 Django CI/CD Pipeline (Pytest Only)

permissions:
  contents: read
  pull-requests: write
  security-events: write
  actions: read

on:
  push:
    branches: [ "dev", "main", "feat/User_autorization" ]
  pull_request:
    branches: [ "dev", "main" ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Enable debug mode'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.12"
  POSTGRES_IMAGE: "postgres:15-alpine"
  REDIS_IMAGE: "redis:7-alpine"

jobs:
  # ==========================================
  # 🎯 FOUNDATION SETUP
  # ==========================================
  foundation-setup:
    name: "🎯 Foundation Setup"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      cache-key: ${{ steps.cache.outputs.cache-hit }}
      python-version: ${{ env.PYTHON_VERSION }}

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "💾 Cache Dependencies"
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: deps-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: "🎭 Install Poetry & Dependencies"
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          poetry config virtualenvs.create false
          poetry install --no-root

  # ==========================================
  # 🧪 TESTS STREAM - PYTEST ONLY
  # ==========================================
  tests-stream:
    name: "🧪 Tests (${{ matrix.test-file }})"
    runs-on: ubuntu-latest
    needs: foundation-setup
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        test-file:
          - 'test_oauth_validators.py'
          - 'test_serializers.py'
          - 'test_views.py'
          - 'test_models.py'
          - 'test_admin.py'
          - 'test_google_oauth.py'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: ci
      IS_TESTING: "True"
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: localhost
      DB_PORT: 5433
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      SECRET_KEY: django-insecure-ci-test-key-${{ matrix.test-file }}
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend

    steps:
      - uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.foundation-setup.outputs.python-version }}

      - name: "💾 Restore Cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: deps-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: "🎭 Install Poetry & System Dependencies"
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          poetry config virtualenvs.create false
          poetry install --no-root
          sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: "⏳ Wait for PostgreSQL"
        run: |
          echo "🐘 Waiting for PostgreSQL..."
          timeout 60 bash -c 'until pg_isready -h localhost -p 5433 -U test_user; do sleep 2; done'
          echo "✅ PostgreSQL is ready!"

      - name: "🗄️ Setup Database (No Django Test Runner)"
        run: |
          export PYTHONPATH=$PWD
          echo "🔧 Running basic Django setup..."
          
          # Only use safe Django commands
          poetry run python -c "
          import django
          import os
          os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'config.settings')
          django.setup()
          print('✅ Django configured successfully')
          "
          
          # Run migrations safely
          poetry run python manage.py migrate --noinput --verbosity=0
          echo "✅ Database migrations completed"

      - name: "📋 Verify Test File"
        run: |
          test_file="tests/${{ matrix.test-file }}"
          echo "🔍 Checking for test file: $test_file"
          
          if [[ -f "$test_file" ]]; then
            echo "✅ Test file found: $test_file"
            echo "📊 File size: $(wc -l < "$test_file") lines"
          else
            echo "❌ Test file NOT found: $test_file"
            echo "📁 Available files in tests/:"
            ls -la tests/ || echo "tests/ directory not found"
            exit 1
          fi

      - name: "🧪 Run Pytest for ${{ matrix.test-file }}"
        run: |
          export PYTHONPATH=$PWD
          test_file="tests/${{ matrix.test-file }}"
          
          echo "🚀 Running pytest for: ${{ matrix.test-file }}"
          echo "====================================='"
          
          # Run pytest with comprehensive options
          poetry run pytest "$test_file" \
            -v \
            --tb=short \
            --maxfail=3 \
            --disable-warnings \
            --no-header \
            --no-summary \
            -q \
            || {
              echo "❌ Tests failed for ${{ matrix.test-file }}"
              echo "📋 Showing test structure:"
              poetry run pytest "$test_file" --collect-only -q || true
              exit 1
            }
          
          echo "✅ All tests passed for ${{ matrix.test-file }}"

      - name: "📊 Test Results Summary"
        if: always()
        run: |
          echo "📈 Test Summary for ${{ matrix.test-file }}:"
          echo "   File: tests/${{ matrix.test-file }}"
          echo "   Status: ${{ job.status }}"
          echo "   Timestamp: $(date)"

  # ==========================================
  # 🧪 ALL TESTS CONSOLIDATED
  # ==========================================
  all-tests:
    name: "🧪 All Tests Consolidated"
    runs-on: ubuntu-latest
    needs: foundation-setup
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: ci
      IS_TESTING: "True"
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: localhost
      DB_PORT: 5433
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      SECRET_KEY: django-insecure-ci-all-tests-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend

    steps:
      - uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.foundation-setup.outputs.python-version }}

      - name: "🎭 Install Poetry & Dependencies"
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          poetry config virtualenvs.create false
          poetry install --no-root
          sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: "⏳ Wait for PostgreSQL"
        run: |
          timeout 60 bash -c 'until pg_isready -h localhost -p 5433 -U test_user; do sleep 2; done'

      - name: "🗄️ Setup Database"
        run: |
          export PYTHONPATH=$PWD
          poetry run python manage.py migrate --noinput --verbosity=0

      - name: "📁 Verify Tests Directory"
        run: |
          echo "🔍 Checking tests/ directory structure:"
          if [[ -d "tests" ]]; then
            echo "✅ tests/ directory found"
            echo "📋 Test files available:"
            find tests/ -name "test_*.py" -type f | sort
            echo ""
            echo "📊 Test files count: $(find tests/ -name 'test_*.py' | wc -l)"
          else
            echo "❌ tests/ directory NOT found"
            echo "📁 Current directory contents:"
            ls -la
            exit 1
          fi

      - name: "🧪 Run ALL Tests from tests/ folder"
        run: |
          export PYTHONPATH=$PWD
          
          echo "🚀 Running ALL tests from tests/ folder with pytest..."
          echo "================================================================"
          
          # Run all tests in tests/ folder
          poetry run pytest tests/ \
            -v \
            --tb=short \
            --maxfail=5 \
            --continue-on-collection-errors \
            --disable-warnings \
            || {
              echo ""
              echo "❌ Some tests failed. Here's the test collection info:"
              poetry run pytest tests/ --collect-only -q || true
              echo ""
              echo "🔍 Let's try running tests individually to see which ones work:"
              for test_file in tests/test_*.py; do
                if [[ -f "$test_file" ]]; then
                  echo "Testing $test_file..."
                  poetry run pytest "$test_file" -v --tb=line || echo "❌ $test_file failed"
                fi
              done
              exit 1
            }
          
          echo "✅ ALL TESTS PASSED!"

  # ==========================================
  # ✨ CODE QUALITY CHECKS
  # ==========================================
  quality-checks:
    name: "✨ Code Quality"
    runs-on: ubuntu-latest
    needs: foundation-setup
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.foundation-setup.outputs.python-version }}

      - name: "💾 Restore Cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: deps-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: "🎭 Install Poetry"
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          poetry config virtualenvs.create false
          poetry install --no-root

      - name: "✨ Run Code Quality Checks"
        run: |
          echo "🔍 Running Black formatter check..."
          poetry run black --check --diff . || echo "❌ Format issues found"
          
          echo "📦 Running isort import check..."
          poetry run isort --check --diff . || echo "❌ Import issues found"
          
          echo "🐍 Running flake8 linting..."
          poetry run flake8 . --max-line-length=120 --extend-ignore=E203,W503 --statistics || echo "❌ Linting issues found"

  # ==========================================
  # 🏁 PIPELINE COMPLETION
  # ==========================================
  pipeline-completion:
    name: "🏁 Pipeline Results"
    runs-on: ubuntu-latest
    needs: [tests-stream, all-tests, quality-checks]
    if: always()
    timeout-minutes: 5

    steps:
      - name: "📊 Generate Pipeline Report"
        run: |
          echo "======================================="
          echo "🚀 DJANGO CI/CD PIPELINE REPORT"
          echo "======================================="
          echo ""
          echo "📈 RESULTS:"
          echo "   🧪 Individual Tests: ${{ needs.tests-stream.result }}"
          echo "   🧪 All Tests: ${{ needs.all-tests.result }}"
          echo "   ✨ Code Quality: ${{ needs.quality-checks.result }}"
          echo ""
          
          # Determine overall status
          if [[ "${{ needs.tests-stream.result }}" == "success" ]] && \
             [[ "${{ needs.all-tests.result }}" == "success" ]] && \
             [[ "${{ needs.quality-checks.result }}" == "success" ]]; then
            echo "🎉 OVERALL STATUS: SUCCESS"
            echo "✅ All tests from tests/ folder passed!"
            echo "✅ Code quality checks passed!"
          else
            echo "❌ OVERALL STATUS: ATTENTION REQUIRED"
            echo "🔍 Please review failed jobs above"
          fi
          
          echo ""
          echo "📁 Tests executed from: tests/ folder only"
          echo "🔧 Test runner: pytest (Django test runner disabled)"
          echo "⏱️  Pipeline completed at: $(date)"
          echo "======================================="
