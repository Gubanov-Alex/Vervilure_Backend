version: '3.8'

x-common-variables: &common-variables
  TZ: ${TZ:-Europe/Kiev}
  LANG: C.UTF-8

x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
    args:
      # ИСПРАВЛЕНО: UID/GID вместо USER_ID/GROUP_ID
      UID: ${UID:-1000}
      GID: ${GID:-1000}
  environment:
    <<: *common-variables
    PYTHONPATH: "/app:/app/src"
    TMPDIR: "/tmp/formatting"
  volumes:
    - logs_data:/app/logs
    - temp_data:/tmp/formatting
  networks:
    - backend
  restart: unless-stopped

services:
  db:
    image: postgres:15-alpine
    container_name: vervilure_db
    environment:
      <<: *common-variables
      POSTGRES_DB: ${DB_NAME:-test_db}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_EXTERNAL_PORT:-127.0.0.1:5490}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-test_db}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: vervilure_redis
    environment:
      <<: *common-variables
    ports:
      - "${REDIS_EXTERNAL_PORT:-127.0.0.1:6390}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --save 60 1000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend

  mailpit:
    image: axllent/mailpit:latest
    container_name: vervilure_mailpit
    restart: unless-stopped
    volumes:
      - mailpit_data:/data
    ports:
      - "${MAILPIT_WEB_PORT:-127.0.0.1:8025}:8025"
      - "${MAILPIT_SMTP_PORT:-127.0.0.1:1025}:1025"
    environment:
      <<: *common-variables
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025/api/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend

  web:
    <<: *app-common
    container_name: vervilure_web
    ports:
      - "${WEB_PORT:-127.0.0.1:8000}:8000"
      - "${DEBUG_PORT:-127.0.0.1:5678}:5678"
    volumes:
      - .:/app:rw
      - logs_data:/app/logs
      - temp_data:/tmp/formatting
    env_file:
      - ${ENV_FILE:-.env.docker}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    command: ${WEB_COMMAND:-python manage.py runserver 0.0.0.0:8000}
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  celery:
    <<: *app-common
    container_name: vervilure_celery
    command: celery -A config worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-2} --queues=celery,emails,maintenance
    volumes:
      - .:/app:rw
      - logs_data:/app/logs
      - temp_data:/tmp/formatting
    env_file:
      - ${ENV_FILE:-.env.docker}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  celery-beat:
    <<: *app-common
    container_name: vervilure_celery_beat
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app:rw
      - logs_data:/app/logs
      - temp_data:/tmp/formatting
    env_file:
      - ${ENV_FILE:-.env.docker}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: ["beat"]

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  mailpit_data:
    driver: local
  logs_data:
    driver: local
  temp_data:
    driver: local

networks:
  backend:
    name: vervilure_network
    driver: bridge
