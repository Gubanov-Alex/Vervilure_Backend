version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vervilure_db
    environment:
      POSTGRES_DB: test_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5490:5432"  # External port 5490 -> internal 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d test_db"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vervilure_redis
    ports:
      - "6390:6379"  # External port 6390 -> internal 6379
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: vervilure_mailpit
    restart: unless-stopped
    volumes:
      - mailpit_data:/data
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
      MP_VERBOSE: 0
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025/api/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 5

  web:
    build: .
    container_name: vervilure_web
    ports:
      - "8000:8000"
      - "5678:5678"
    volumes:
      - .:/app
      - logs_data:/app/logs
      - media_data:/app/media
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    stdin_open: true
    tty: true
    restart: unless-stopped

  celery:
    build: .
    container_name: vervilure_celery
    command: celery -A config worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
      - logs_data:/app/logs
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Optional: Celery Beat for scheduled tasks
  celery-beat:
    build: .
    container_name: vervilure_celery_beat
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
      - ./logs:/app/logs
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["beat"]  # Optional service, start with --profile beat

volumes:
  postgres_data:
  redis_data:
  mailpit_data:
  logs_data:
  media_data:

networks:
  default:
    name: vervilure_network
