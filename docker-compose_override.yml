version: '3.8'

services:
  db:
    container_name: vervilure_prod_db
    # Production database configuration
    environment:
      POSTGRES_DB: ${DB_NAME:-vervilure_production_db}
      POSTGRES_USER: ${DB_USER:-vervilure_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"  # Прямой доступ в production
    # Production volume configuration
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  redis:
    container_name: vervilure_prod_redis
    ports:
      - "6379:6379"  # Прямой доступ в production
    volumes:
      - redis_prod_data:/data
    # Production Redis configuration with persistence
    command: redis-server --appendonly yes --save 60 1000 --maxmemory 256mb --maxmemory-policy allkeys-lru

  # Убираем mailpit в production (используем внешний SMTP)
  mailpit:
    profiles: ["dev-only"]  # Не запускается в production

  web:
    container_name: vervilure_prod_web
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    # Production volumes (no bind mounts)
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
      - logs_data:/app/logs
    # Production command with Gunicorn
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-2} --worker-class ${GUNICORN_WORKER_CLASS:-sync} --worker-connections ${GUNICORN_WORKER_CONNECTIONS:-1000} --max-requests ${GUNICORN_MAX_REQUESTS:-1000} --max-requests-jitter ${GUNICORN_MAX_REQUESTS_JITTER:-50} --timeout 120 --keep-alive 5 --preload
    # Remove development settings
    stdin_open: false
    tty: false
    # Production healthcheck
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  celery:
    container_name: vervilure_prod_celery
    env_file:
      - .env.production
    volumes:
      - logs_data:/app/logs
    # Production Celery configuration
    command: celery -A config worker --loglevel=info --concurrency=${CELERY_WORKERS:-2} --queues=celery,emails,maintenance --max-tasks-per-child=1000 --time-limit=1800 --soft-time-limit=1500

  celery-beat:
    container_name: vervilure_prod_celery_beat
    env_file:
      - .env.production
    volumes:
      - logs_data:/app/logs
    # Production Beat configuration
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler --pidfile=/tmp/celerybeat.pid

  # Production Nginx
  nginx:
    image: nginx:alpine
    container_name: vervilure_prod_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/mediafiles:ro
      - logs_data:/var/log/nginx
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  # Production-specific volumes
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
