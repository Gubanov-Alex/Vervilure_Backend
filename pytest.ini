[tool:pytest]
DJANGO_SETTINGS_MODULE = tests.test_settings
addopts =
    --strict-markers
    --strict-config
    --tb=short
    --maxfail=3
    --color=yes
    -v
    -x
    --disable-warnings
    --reuse-db
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
norecursedirs = .git .tox .env venv env migrations node_modules

# Custom markers - ИСПРАВЛЯЕТ WARNING
markers =
    admin: marks tests as admin interface tests
    integration: marks tests as integration tests
    api: marks tests as API tests
    auth: marks tests as authentication tests
    slow: marks tests as slow running
    unit: marks tests as unit tests
    functional: marks tests as functional tests
    performance: marks tests as performance tests
    security: marks tests as security tests
    oauth: marks tests as OAuth tests
    celery: marks tests as Celery tests
    email: marks tests as email functionality tests
    database: marks tests as database tests
    cache: marks tests as cache tests
    external: marks tests that require external services

# Django specific settings
DJANGO_TEST_PROCESSES = 1
DJANGO_LIVE_TEST_SERVER_ADDRESS = localhost:8081-8100

# Coverage settings (если используется)
# --cov=src
# --cov-report=html
# --cov-report=term-missing
# --cov-fail-under=80

# Filtering options
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
    ignore::django.utils.deprecation.RemovedInDjango50Warning
    ignore::rest_framework.RemovedInDRF315Warning

# Test discovery
minversion = 6.0
