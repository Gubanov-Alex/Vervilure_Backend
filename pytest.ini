[tool:pytest]
# Django settings module for tests
DJANGO_SETTINGS_MODULE = tests.test_settings

# Test discovery and execution
python_files = test_*.py *_test.py tests.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Pytest plugins
addopts =
    --strict-markers
    --strict-config
    --disable-warnings
    --tb=short
    --no-migrations
    --reuse-db
    --nomigrations
    --maxfail=10
    --durations=10
    -v

# Django-specific options
django_find_project = false

# Markers for test categorization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    api: marks tests as API tests
    auth: marks tests as authentication tests
    security: marks tests as security tests
    throttling: marks tests as throttling tests
    performance: marks tests as performance tests

# Minimum Python version
minversion = 3.9

# Test execution options
timeout = 300
timeout_method = thread

# Coverage options (if using pytest-cov)
# addopts = --cov=src --cov-report=html --cov-report=term-missing --cov-fail-under=80

# Warnings filters
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*SWAGGER_USE_COMPAT_RENDERERS.*:DeprecationWarning
    ignore:.*USE_L10N.*:RemovedInDjango50Warning

# Environment variables for tests
env =
    TESTING=True
    THROTTLING_DISABLED=True
    ENVIRONMENT=testing
