[tool:pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = test_*.py *_test.py tests.py
python_classes = Test*
python_functions = test_*
testpaths = tests
norecursedirs = .git .tox dist build *.egg node_modules
addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --maxfail=3
    --reuse-db
    --no-migrations
    --nomigrations
    --disable-warnings
    --durations=10
    --color=yes
    -p no:cacheprovider

# Django specific settings
django_find_project = false
django_debug_mode = false

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    admin: marks tests for Django admin
    api: marks tests for API endpoints
    auth: marks tests for authentication
    db: marks tests that require database
    redis: marks tests that require Redis
    external: marks tests that require external services

# Environment variables for tests
env =
    IS_TESTING = True
    DJANGO_SETTINGS_MODULE = config.settings
    DATABASE_URL = postgresql://admin:admin_password@localhost:5432/test_db
    CELERY_TASK_ALWAYS_EAGER = True
    CELERY_TASK_EAGER_PROPAGATES = True
    EMAIL_BACKEND = django.core.mail.backends.locmem.EmailBackend

# Filter warnings
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*DJANGO_SETTINGS_MODULE.*:UserWarning
    ignore::django.utils.deprecation.RemovedInDjango51Warning
