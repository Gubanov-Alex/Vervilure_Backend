version: '3.8'

# Production overrides for docker-compose.yml
services:
  db:
    # В production не открываем порты наружу
    ports: []
    environment:
      POSTGRES_DB: ${DB_NAME:-vervilure_db}
      POSTGRES_USER: ${DB_USER:-vervilure_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    # Production оптимизации для PostgreSQL
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
    restart: always

  redis:
    # В production не открываем порты наружу
    ports: []
    # Production настройки Redis
    command: >
      redis-server
      --appendonly yes
      --save 60 1000
      --save 300 10
      --save 900 1
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 60
    restart: always

  mailpit:
    # В production ограничиваем доступ к Mailpit
    ports: []
    # Можно оставить для внутреннего доступа через SSH туннель:
    # ssh -L 8025:localhost:18025 deploy@your-server
    # Тогда раскомментируйте:
    # ports:
    #   - "127.0.0.1:18025:8025"
    restart: always

  web:
    # Production команда с Gunicorn
    command: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers ${GUNICORN_WORKERS:-1}
      --threads ${GUNICORN_THREADS:-1}
      --timeout ${GUNICORN_TIMEOUT:-120}
      --max-requests ${GUNICORN_MAX_REQUESTS:-1000}
      --max-requests-jitter ${GUNICORN_MAX_REQUESTS_JITTER:-50}
      --access-logfile -
      --error-logfile -
      --log-level ${LOG_LEVEL:-info}
      --capture-output
    # В production не открываем порты напрямую
    ports: []
    env_file:
      - ${ENV_FILE:-.env.production}
    volumes:
      - .:/app:rw
      - logs_data:/app/logs
      - static_data:/app/staticfiles
      - media_data:/app/media
      - temp_data:/tmp/formatting
    restart: always
    # Production limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 512M

  celery:
    command: >
      celery -A config worker
      --loglevel=${LOG_LEVEL:-info}
      --concurrency=${CELERY_CONCURRENCY:-2}
      --queues=celery,emails,maintenance
      --max-tasks-per-child=${CELERY_WORKER_MAX_TASKS_PER_CHILD:-1000}
      --time-limit=1800
      --soft-time-limit=1700
    env_file:
      - ${ENV_FILE:-.env.production}
    volumes:
      - .:/app:ro
      - logs_data:/app/logs
      - temp_data:/tmp/formatting
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  celery-beat:
    env_file:
      - ${ENV_FILE:-.env.production}
    volumes:
      - .:/app:ro
      - logs_data:/app/logs
      - temp_data:/tmp/formatting
    restart: always
    # В production всегда запускаем beat
    profiles: []
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # Nginx for static
  nginx:
    image: nginx:alpine
    container_name: vervilure_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_data:/static:ro
      - media_data:/media:ro
    depends_on:
      - web
    restart: always
    networks:
      - backend

# Production volumes
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  mailpit_data:
    driver: local
  logs_data:
    driver: local
  static_data:
    driver: local
  media_data:
    driver: local
  temp_data:
    driver: local

networks:
  backend:
    name: vervilure_prod_network
    driver: bridge
